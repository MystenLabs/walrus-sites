name: "E2E: Aggregator Timeout"

# Reproduces SEW-893. Stands up mock-aggregator + portal + envoy in front,
# fires a request, and asserts the portal returns its own
# aggregatorFail() body (HTTP 503) instead of Envoy's connection_termination
# response surfacing through the proxy. Regression guard for the
# AbortSignal.timeout + idleTimeout sizing fix in url_fetcher.ts / index.ts.

on:
  pull_request:
    paths:
      - portal/common/lib/src/url_fetcher.ts
      - portal/common/lib/src/priority_executor.ts
      - portal/common/lib/src/rpc_selector.ts
      - portal/server/index.ts
      - portal/server/src/url_fetcher_factory.ts
      - portal/server/src/configuration_loader.ts
      - scripts/e2e-aggregator-timeout/**
      - .github/workflows/e2e-aggregator-timeout.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-aggregator-timeout-${{ github.ref }}
  cancel-in-progress: true

env:
  ENVOY_IMAGE: envoyproxy/envoy:v1.31.7

jobs:
  e2e:
    name: E2E aggregator timeout
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2
        with:
          # Pin to the version used in portal/docker/server/Dockerfile (production).
          # Bun's AbortSignal / idleTimeout behavior varies across versions and
          # this regression depends on the same runtime semantics as prod.
          bun-version: 1.2.5

      - name: Install Envoy (extract from Docker image)
        run: |
          docker pull "$ENVOY_IMAGE"
          docker create --name envoy-extract "$ENVOY_IMAGE" >/dev/null
          docker cp envoy-extract:/usr/local/bin/envoy /usr/local/bin/envoy
          docker rm envoy-extract >/dev/null
          envoy --version

      - name: Install portal deps
        working-directory: portal
        run: bun install --frozen-lockfile

      - name: Run e2e
        run: scripts/e2e-aggregator-timeout/e2e.sh

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: e2e-aggregator-timeout-logs
          path: scripts/e2e-aggregator-timeout/.logs/
          retention-days: 7
